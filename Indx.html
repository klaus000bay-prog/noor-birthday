<!DOCTYPE html>
<html>
<head>
<title>For Noor</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

.container{
max-width:600px;
padding:30px;
z-index:2;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
background:white;
color:black;
cursor:pointer;
margin-top:30px;
}

.star{
position:absolute;
color:white;
font-size:10px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

.firework{
position:absolute;
font-size:30px;
animation:boom 1.2s infinite;
}

@keyframes boom{
0%{transform:scale(0)}
50%{transform:scale(1.5)}
100%{transform:scale(0)}
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Hey Noor...</h1>

<p id="text">
Before your birthday ends, there’s something I wanted to show you.
</p>

<button onclick="next()">Continue</button>

</div>

<script>

let step=0

let messages=[
"Out of billions of people in the world... we somehow crossed paths.",
"Sometimes the smallest moments stay in memory the longest.",
"Today is your day.",
"Happy Birthday Noor 🎂",
"I hope this year brings you happiness and beautiful memories."
]

function next(){

step++

if(step < messages.length){
document.getElementById("text").innerText = messages[step]
}

if(step == 3){
launchFireworks()
}

}

for(let i=0;i<100;i++){
let star=document.createElement("div")
star.className="star"
star.innerHTML="★"
star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"
document.body.appendChild(star)
}

function launchFireworks(){

for(let i=0;i<20;i++){
let f=document.createElement("div")
f.className="firework"
f.innerHTML="🎆"
f.style.left=Math.random()*100+"%"
f.style.top=Math.random()*100+"%"
document.body.appendChild(f)
}

}

</script>

</body>
</html>

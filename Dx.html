<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sadaf (Noor)</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

/* container */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:700px;
}

/* title */

h1{
font-size:52px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #fff}
to{text-shadow:0 0 30px #ff9bd3}
}

button{
margin-top:25px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
color:#ff4f81;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* cake */

.cake{
font-size:60px;
margin-top:15px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* message */

.message{
margin-top:30px;
font-size:22px;
display:none;
line-height:1.7;
}

/* floating hearts */

.heart{
position:absolute;
font-size:22px;
color:#ff7aa2;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday Sadaf (Noor)</h1>

<p>Today the universe celebrates someone special ✨</p>

<div class="cake">🎂</div>

<button onclick="reveal()">Tap Your Surprise</button>

<div class="message" id="msg">
<p id="text"></p>
</div>

</div>

<script>

/* stars background */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

/* floating hearts */

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=4+Math.random()*3+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),7000);
}

setInterval(createHeart,400);


/* message */

const message=`Sadaf,

I didn't know what gift to give you today,
so I made something different.

A small place on the internet
that exists just to celebrate you.

Your smile makes ordinary days brighter.
Your presence makes moments beautiful.

I hope this year brings you happiness,
peace, and dreams coming true.

Happy Birthday Noor ✨`;

let i=0;

function typeWriter(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

/* reveal */

function reveal(){

document.getElementById("msg").style.display="block";

typeWriter();

/* confetti */

for(let i=0;i<120;i++){

const conf=document.createElement("div");

conf.style.position="absolute";
conf.style.width="8px";
conf.style.height="8px";
conf.style.background="white";

conf.style.left=Math.random()*100+"vw";
conf.style.top="-10px";

conf.style.transition="3s";

document.body.appendChild(conf);

setTimeout(()=>{
conf.style.top="100vh";
conf.style.transform="rotate(720deg)";
},50);

setTimeout(()=>conf.remove(),3000);

}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adventure for Sadaf (Noor)</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
overflow:hidden;
}

/* sections */

.section{
display:none;
padding-top:120px;
height:100vh;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.8;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

/* title */

h1{
font-size:50px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white}
to{text-shadow:0 0 30px #ff9bd3}
}

/* button */

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4f81;
cursor:pointer;
margin-top:20px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

/* cake */

.cake{
font-size:60px;
margin-top:20px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-10px)}
}

/* hearts */

.heart{
position:absolute;
color:#ff7aa2;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* message */

.message{
font-size:22px;
max-width:700px;
margin:auto;
line-height:1.6;
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

</style>

</head>

<body>

<!-- SECTION 1 -->

<div class="section" id="s1" style="display:block">

<h1>Hello Sadaf (Noor)</h1>

<p>This is not just a birthday wish.</p>

<p>It's a small adventure made just for you.</p>

<button onclick="next(2)">Start the Journey</button>

</div>

<!-- SECTION 2 -->

<div class="section" id="s2">

<h1>Step 1</h1>

<p>Some people simply have birthdays.</p>

<p>But today the universe celebrates someone special.</p>

<button onclick="next(3)">Continue</button>

</div>

<!-- SECTION 3 PUZZLE -->

<div class="section" id="s3">

<h1>One Small Question</h1>

<p>Who is this adventure made for?</p>

<input id="answer" placeholder="Type the name">

<br><br>

<button onclick="check()">Unlock</button>

</div>

<!-- FINAL SECTION -->

<div class="section" id="s4">

<h1>Happy Birthday Sadaf (Noor)</h1>

<div class="cake">🎂</div>

<p class="message" id="text"></p>

</div>

<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
document.body.appendChild(star);
}

/* hearts */

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=4+Math.random()*3+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
}

setInterval(createHeart,400);

/* navigation */

function next(n){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById("s"+n).style.display="block";

}

/* puzzle */

function check(){

let ans=document.getElementById("answer").value.toLowerCase();

if(ans==="sadaf"){
next(4);
typeWriter();
confetti();
}else{
alert("Hmm... try again.");
}

}

/* message */

const message=`Sadaf,

I didn't know what gift could match someone like you,
so I made something different.

A little adventure on the internet,
just to celebrate you.

Your smile makes days brighter.
Your presence makes moments beautiful.

I hope this year brings you happiness,
peace, and dreams coming true.

Happy Birthday Noor ✨`;

let i=0;

function typeWriter(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

/* confetti */

function confetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div");

conf.style.position="absolute";
conf.style.width="8px";
conf.style.height="8px";
conf.style.background="white";

conf.style.left=Math.random()*100+"vw";
conf.style.top="-10px";

conf.style.transition="3s";

document.body.appendChild(conf);

setTimeout(()=>{
conf.style.top="100vh";
conf.style.transform="rotate(720deg)";
},50);

setTimeout(()=>conf.remove(),3000);

}

}

</script>

</body>
</html>
